apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * MODENACEAC 6XSIM — Configuración de build Android
 * Tablet 10" vertical · Android 12+ (API 32+)
 */

react {
    /* Hermes JS engine — mejor performance en tablets */
    hermesEnabled = true
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.modenaceac.sixsim"

    defaultConfig {
        applicationId "com.modenaceac.sixsim"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        versionName "4.0.0"

        // Nombre que aparece en el launcher de la tablet
        resValue "string", "app_name", "MODENACEAC 6XSIM"

        // Filtrar solo arquitecturas ARM para tablets modernas
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Para release: colocar el keystore en android/keystores/release.keystore
            // y ejecutar el script generate_keystore.sh incluido en el proyecto
            if (project.hasProperty('MODENACEAC_RELEASE_STORE_FILE')) {
                storeFile file(MODENACEAC_RELEASE_STORE_FILE)
                storePassword MODENACEAC_RELEASE_STORE_PASSWORD
                keyAlias MODENACEAC_RELEASE_KEY_ALIAS
                keyPassword MODENACEAC_RELEASE_KEY_PASSWORD
            } else {
                // Fallback: usar debug keystore para builds de prueba
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            versionNameSuffix "-DEBUG"
            debuggable true
            minifyEnabled false
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Optimización para tablets
    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a", "armeabi-v7a"
            universalApk true   // También genera APK universal
        }
    }
}

dependencies {
    // React Native core
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // UDP para comunicación con X-Plane
    implementation 'com.facebook.soloader:soloader:0.10.5'
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
